config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint_fix
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/madgeek-arc/federation-adapter:
      branch: main
      repo: https://github.com/madgeek-arc/federation-adapter
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/madgeek-arc/federation-adapter git:
        commands:
        - /usr/bin/env sh .sqa/script.droopy-thistle-falcon.sh
        container: qc.acc_shabby-malachite-toucan
  QC.Doc:
    repos:
      github.com/madgeek-arc/federation-adapter find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.hasty-rose-anteater.sh
        container: qc.doc_slaphappy-cyan-vulture
      github.com/madgeek-arc/federation-adapter git:
        commands:
        - /usr/bin/env sh .sqa/script.foggy-carmine-shark.sh
        container: qc.doc_woolly-jade-barracuda
      github.com/madgeek-arc/federation-adapter markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.ugly-asparagus-mau.sh
        container: qc.doc_sleepy-tangerine-fish
  QC.Lic:
    repos:
      github.com/madgeek-arc/federation-adapter licensee:
        commands:
        - /usr/bin/env sh .sqa/script.ready-cobalt-avocet.sh
        container: qc.lic_cheeky-charcoal-scorpion
  QC.Sty:
    repos:
      github.com/madgeek-arc/federation-adapter checkstyle:
        commands:
        - /usr/bin/env sh .sqa/script.jumpy-tan-impala.sh
        container: qc.sty_boozy-amaranth-emu
      github.com/madgeek-arc/federation-adapter jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.geeky-thistle-buzzard.sh
        container: qc.sty_squirrely-seashell-gharial
  QC.Ver:
    repos:
      github.com/madgeek-arc/federation-adapter get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.zippy-charcoal-olm.sh
        container: qc.ver_surly-champagne-pig
timeout: 5400
