config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint_fix
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/madgeek-arc/federation-adapter:
      branch: master
      repo: https://github.com/madgeek-arc/federation-adapter
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/madgeek-arc/federation-adapter git:
        commands:
        - /usr/bin/env sh .sqa/script.woozy-turquoise-crocodile.sh
        container: qc.acc_craggy-vermilion-coral
  QC.Doc:
    repos:
      github.com/madgeek-arc/federation-adapter find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.leaky-pumpkin-schnauzer.sh
        container: qc.doc_goopy-rose-crane
      github.com/madgeek-arc/federation-adapter git:
        commands:
        - /usr/bin/env sh .sqa/script.pretty-seashell-gopher.sh
        container: qc.doc_craggy-carmine-shrew
      github.com/madgeek-arc/federation-adapter markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.wiggy-amaranth-bandicoot.sh
        container: qc.doc_stealthy-cornflower-lobster
  QC.Lic:
    repos:
      github.com/madgeek-arc/federation-adapter licensee:
        commands:
        - /usr/bin/env sh .sqa/script.trippy-magnolia-monster.sh
        container: qc.lic_silly-wisteria-worm
  QC.Sty:
    repos:
      github.com/madgeek-arc/federation-adapter checkstyle:
        commands:
        - /usr/bin/env sh .sqa/script.lanky-wisteria-dollar.sh
        container: qc.sty_trippy-emerald-whale
      github.com/madgeek-arc/federation-adapter jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.skanky-copper-mayfly.sh
        container: qc.sty_droopy-red-binturong
  QC.Ver:
    repos:
      github.com/madgeek-arc/federation-adapter get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.gimpy-vermilion-eel.sh
        container: qc.ver_dorky-red-macaw
timeout: 5400
